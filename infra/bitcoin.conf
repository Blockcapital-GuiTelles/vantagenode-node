# Bitcoin Core configuration for the VantageNode onchain node.
#
# Optimised for: archive-grade indexing + RPC access from the local
# indexer service. NOT optimised for: pruning, wallet operations.
#
# Drop this file at /opt/vantagenode/bitcoin/bitcoin.conf (mounted into
# the bitcoind container at /home/bitcoin/.bitcoin/bitcoin.conf).
#
# Storage budget at current chain size (Jun 2026):
#   - Blocks + chainstate: ~720 GB
#   - txindex: ~60 GB
#   - coinstatsindex: <1 GB
#   Total: ~800 GB. Headroom on a 1 TB volume is comfortable.

# ============================================================
# Network
# ============================================================
server=1
listen=1
# Be a good citizen: relay blocks/txs to up to 125 peers. The default
# is 125, kept explicit so an operator skimming this file knows.
maxconnections=125
# IPv4 + IPv6 both enabled by default — no setting needed.
# Tor is NOT enabled here; for privacy upgrade, add proxy=127.0.0.1:9050
# and bind=127.0.0.1 after installing tor.

# ============================================================
# Indexing — non-negotiable for our derived metrics
# ============================================================
# Maintain a full transaction index. Required for getrawtransaction with
# arbitrary tx id (and for any block-explorer use case, electrs included).
txindex=1
# Maintain the UTXO set statistics index. Without this, gettxoutsetinfo
# (used by supply / coinstats / UTXO-age scans) takes ~30s per call.
# With it, near-instant. Tiny disk cost (<1 GB).
coinstatsindex=1

# Pruning explicitly OFF — we want full archive history available for
# any future analytics pipeline that walks blocks backwards.
prune=0

# ============================================================
# Performance tuning
# ============================================================
# dbcache: how much RAM Bitcoin Core uses for the UTXO set during IBD.
# Higher = faster initial sync. We have 64 GB on the AX42, so 8 GB is
# safe and dramatically speeds up the first 1-3 days of catch-up.
# After IBD, dbcache barely matters; you can keep it high or lower it.
dbcache=8000

# Limit parallel script verification to half the cores so the indexer
# service + Postgres still get CPU even during IBD. AX42 has 12 vcores
# (Ryzen 5 5600X = 6c/12t), so 6 is a clean half.
par=6

# ============================================================
# RPC — locally accessible only
# ============================================================
# RPC listens on the docker network, not on a public interface.
# The indexer container is the only consumer; bitcoind never exposes
# RPC to the host's public IP.
rpcbind=0.0.0.0
rpcallowip=127.0.0.1
rpcallowip=172.16.0.0/12  # Docker default network range
rpcallowip=192.168.0.0/16

# Authentication uses rpcauth (hashed) instead of rpcuser/rpcpassword,
# so the cleartext password never lives on disk inside bitcoin.conf.
# Generate with: bitcoin/share/rpcauth/rpcauth.py <user>
# Then copy the rpcauth=... line below.
# rpcauth=indexer:HASHED$VALUE — set via env-substituted entrypoint.
# (See docker-compose entrypoint that templates this.)

# Number of concurrent RPC connections the indexer can hold open.
rpcthreads=16
rpcworkqueue=64

# ============================================================
# ZeroMQ — push notifications for the indexer
# ============================================================
# The indexer subscribes to rawblock to react in real time (incremental
# state update on every new block). zmqpubrawtx is also enabled for
# future mempool/fee analysis features.
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333
zmqpubhashblock=tcp://0.0.0.0:28334

# ============================================================
# Logging
# ============================================================
# Verbose enough to debug issues, quiet enough that the log file
# doesn't grow unbounded. logrotate handles rotation outside the
# container.
debug=0
shrinkdebugfile=1

# ============================================================
# Mempool
# ============================================================
# Mempool size cap in MB. Default 300; we bump to 600 because our fee
# indicator wants a broader view of pending tx pressure.
maxmempool=600
# Keep transactions in mempool for up to 7 days (default 336h = 14d
# is fine too; 168h matches the F&G index window).
mempoolexpiry=168
