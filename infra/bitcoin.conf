# VantageNode bitcoind config — ARCHIVE mode (no pruning, full UTXO history).
# Transition from pruned mode 2026-06-10 to enable Tier-1+Tier-2 indexers
# that need historical block data (MVRV, NUPL, SOPR, RHODL, supply LTH/STH).
#
# Backup of pre-archive pruned config:
#   bitcoin.conf.pruned-backup-20260610-140658
#
# Expected datadir size after IBD completes: ~720GB
#   blocks/      ~650GB
#   chainstate/  ~12GB
#   indexes/txindex   ~50GB
#   indexes/coinstatsindex  ~200MB

server=1
listen=1
maxconnections=125

# Archive: NO pruning. Default mode (omit prune= line entirely) keeps
# every block since genesis. Required for any indexer that walks
# historical UTXO age (MVRV / Realized Loss / NUPL / SOPR).
# Previous: prune=80000 (kept only last ~80GB of blocks).

# Build the transaction-by-hash index during IBD. Lets the Tier-1
# indexer resolve any historical txid in O(1) instead of scanning
# blocks. ~50GB extra disk. Cheaper to build during IBD than as
# a separate reindex later (~12h saved).
txindex=1

# UTXO set stats index — same as before; needed by gettxoutsetinfo.
coinstatsindex=1

# Memory budget for chainstate cache. 8GB is the sweet spot on this
# host (Ryzen 7, 64GB RAM); higher just trades back to disk faster
# under sustained IBD throughput.
dbcache=8192
maxorphantx=10
maxmempool=300

# RPC binding — Docker private network ranges + loopback.
rpcbind=0.0.0.0
rpcallowip=172.16.0.0/12
rpcallowip=10.0.0.0/8
rpcallowip=127.0.0.1
rpcauth=indexer:1e9706b41aba03709fb00dfd041bcea0$22e288f3a932b97615a12ebc3fa8ba8d78bc240bc13285ac631e5acd10805f29

# ZMQ broadcast — Tier-1 indexer subscribes for incremental updates.
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333
zmqpubhashblock=tcp://0.0.0.0:28334
