# VantageNode onchain stack — bitcoind + postgres + indexer + caddy.
#
# Target host: Hetzner AX42 (or equivalent dedicated server) running
# Debian 12 with docker + docker compose plugin installed by
# infra/provision.sh.
#
# Storage paths follow the convention /opt/vantagenode/<service>/data,
# mounted as named volumes below. On the AX42 those map to the NVMe
# RAID1 so all data is mirrored.

services:
  bitcoind:
    image: lncm/bitcoind:v27.2
    container_name: vn-bitcoind
    restart: unless-stopped
    stop_grace_period: 5m  # let it flush properly during shutdowns
    volumes:
      - bitcoin-data:/data/.bitcoin
      - ./infra/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
    # bitcoind is internal-only. RPC reaches it from the indexer over
    # the compose network; ZMQ likewise. No public ports.
    expose:
      - "8332"   # RPC
      - "28332"  # ZMQ rawblock
      - "28333"  # ZMQ rawtx
      - "28334"  # ZMQ hashblock
    # P2P listener on the public host. Lets us be a good citizen and
    # serve blocks back to the network. Bitcoin Core handles connection
    # limits and ban scoring internally.
    ports:
      - "8333:8333"
    environment:
      # rpcauth pair generated by infra/gen-rpcauth.sh and stamped here
      # via .env so the cleartext password never lives in the repo.
      RPCAUTH: ${BITCOIND_RPCAUTH}
    # Templating the rpcauth into bitcoin.conf at start-up: cheapest
    # approach is a small entrypoint that appends the line. We use
    # entrypoint: (not command:) because the lncm/bitcoind image ships
    # its own ENTRYPOINT and treating our sh script as `command` makes
    # it land as positional args to that script, blowing up with the
    # classic `Command line contains unexpected token 'sh'` error.
    # Overriding the entrypoint entirely + invoking sh directly is
    # cleaner.
    entrypoint:
      - sh
      - -c
      - |
        # Write the rpcauth line to a sidecar file inside the data
        # volume (writable) — the main bitcoin.conf is mounted read-only
        # from the host and pulls this in via includeconf=rpcauth.conf.
        # The doubled $$ below is mandatory: docker-compose interpolates
        # single-$ tokens at YAML parse time (even inside comments!), so
        # the doubled form is what survives to the container shell as a
        # literal single-$. The container then reads RPCAUTH from the
        # environment block below.
        echo "rpcauth=$$RPCAUTH" > /data/.bitcoin/rpcauth.conf
        exec bitcoind -datadir=/data/.bitcoin

  postgres:
    image: postgres:16-alpine
    container_name: vn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vantagenode
      POSTGRES_USER: vn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vn", "-d", "vantagenode"]
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: vn-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started
    environment:
      # bitcoind RPC connection
      BITCOIN_RPC_HOST: bitcoind
      BITCOIN_RPC_PORT: 8332
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD}
      # Postgres
      DATABASE_URL: postgres://vn:${POSTGRES_PASSWORD}@postgres:5432/vantagenode
      # ZMQ
      BITCOIN_ZMQ_RAWBLOCK: tcp://bitcoind:28332
      # API
      NODE_SHARED_SECRET: ${NODE_SHARED_SECRET}
      PORT: 3001
      NODE_ENV: production
    expose:
      - "3001"

  caddy:
    image: caddy:2.8-alpine
    container_name: vn-caddy
    restart: unless-stopped
    depends_on:
      - indexer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME}

volumes:
  bitcoin-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vantagenode/bitcoin
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vantagenode/postgres
  caddy-data:
  caddy-config:
