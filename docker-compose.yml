# VantageNode onchain stack — bitcoind + postgres + indexer + caddy.
#
# Target host: Hetzner AX42 (or equivalent dedicated server) running
# Debian 12 with docker + docker compose plugin installed by
# infra/provision.sh.
#
# Storage paths follow the convention /opt/vantagenode/<service>/data,
# mounted as named volumes below. On the AX42 those map to the NVMe
# RAID1 so all data is mirrored.

services:
  bitcoind:
    image: lncm/bitcoind:v27.2
    container_name: vn-bitcoind
    restart: unless-stopped
    stop_grace_period: 5m  # let it flush properly during shutdowns
    volumes:
      - bitcoin-data:/data/.bitcoin
      - ./infra/bitcoin.conf:/data/.bitcoin/bitcoin.conf:ro
    # bitcoind is internal-only. RPC reaches it from the indexer over
    # the compose network; ZMQ likewise. No public ports.
    expose:
      - "8332"   # RPC
      - "28332"  # ZMQ rawblock
      - "28333"  # ZMQ rawtx
      - "28334"  # ZMQ hashblock
    # P2P listener on the public host. Lets us be a good citizen and
    # serve blocks back to the network. Bitcoin Core handles connection
    # limits and ban scoring internally.
    ports:
      - "8333:8333"
    environment:
      # rpcauth pair generated by infra/gen-rpcauth.sh and stamped here
      # via .env so the cleartext password never lives in the repo.
      RPCAUTH: ${BITCOIND_RPCAUTH}
    # Templating the rpcauth into bitcoin.conf at start-up: cheapest
    # approach is a small entrypoint that appends the line. We use
    # entrypoint: (not command:) because the lncm/bitcoind image ships
    # its own ENTRYPOINT and treating our sh script as `command` makes
    # it land as positional args to that script, blowing up with the
    # classic `Command line contains unexpected token 'sh'` error.
    # Overriding the entrypoint entirely + invoking sh directly is
    # cleaner.
    entrypoint:
      - sh
      - -c
      - |
        # Write the rpcauth line to a sidecar file inside the data
        # volume (writable) — the main bitcoin.conf is mounted read-only
        # from the host and pulls this in via includeconf=rpcauth.conf.
        # The doubled $$ below is mandatory: docker-compose interpolates
        # single-$ tokens at YAML parse time (even inside comments!), so
        # the doubled form is what survives to the container shell as a
        # literal single-$. The container then reads RPCAUTH from the
        # environment block below.
        echo "rpcauth=$$RPCAUTH" > /data/.bitcoin/rpcauth.conf
        exec bitcoind -datadir=/data/.bitcoin

  postgres:
    image: postgres:16-alpine
    container_name: vn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vantagenode
      POSTGRES_USER: vn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "vn", "-d", "vantagenode"]
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    # Sits behind the `api` profile because the build needs a populated
    # package-lock.json which we lock in alongside the first real Tier-0
    # work. Until then, `docker compose up -d` brings up the core stack
    # (bitcoind, postgres, observability) without trying to build this.
    # Run explicitly with: docker compose --profile api up -d
    profiles: ["api"]
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: vn-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      bitcoind:
        condition: service_started
    environment:
      # bitcoind RPC connection
      BITCOIN_RPC_HOST: bitcoind
      BITCOIN_RPC_PORT: 8332
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD}
      # Postgres
      DATABASE_URL: postgres://vn:${POSTGRES_PASSWORD}@postgres:5432/vantagenode
      # ZMQ
      BITCOIN_ZMQ_RAWBLOCK: tcp://bitcoind:28332
      # API
      NODE_SHARED_SECRET: ${NODE_SHARED_SECRET}
      PORT: 3001
      NODE_ENV: production
    expose:
      - "3001"

  caddy:
    # Public TLS edge. Same `api` profile as the indexer — both come up
    # together once the indexer is buildable AND DNS is pointing at us.
    profiles: ["api"]
    image: caddy:2.8-alpine
    container_name: vn-caddy
    restart: unless-stopped
    depends_on:
      - indexer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      NODE_HOSTNAME: ${NODE_HOSTNAME}

  # ============================================================
  # OBSERVABILITY — Portainer / Prometheus / Grafana / Uptime Kuma
  # All UIs exposed on the public IP with strong admin passwords set
  # via .env. Once DNS+Caddy are live (F2), these move behind path-
  # based auth on the main hostname.
  # ============================================================

  portainer:
    image: portainer/portainer-ce:latest
    container_name: vn-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    # Portainer ships with no admin user; first browser visit prompts
    # to create one. We also feed an --admin-password-file via
    # entrypoint args to seed a known one (avoids race where someone
    # else hits the IP first and claims admin).
    command:
      - --admin-password
      - ${PORTAINER_ADMIN_BCRYPT}

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: vn-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
    # host.docker.internal lets prometheus reach the host's node_exporter
    # on port 9100 without us hard-coding the LAN IP of the bridge.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Bound to compose network only — Grafana queries it, no external exposure.
    expose:
      - "9090"

  bitcoin-exporter:
    image: jvstein/bitcoin-prometheus-exporter:latest
    container_name: vn-bitcoin-exporter
    restart: unless-stopped
    depends_on:
      bitcoind:
        condition: service_started
    environment:
      BITCOIN_RPC_HOST: bitcoind
      BITCOIN_RPC_PORT: "8332"
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD}
    expose:
      - "9332"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: vn-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://65.108.141.77:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: vn-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"

volumes:
  bitcoin-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vantagenode/bitcoin
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/vantagenode/postgres
  caddy-data:
  caddy-config:
  portainer-data:
  prometheus-data:
  grafana-data:
  uptime-kuma-data:
